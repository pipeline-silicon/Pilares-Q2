                height: 100%;

                align-items: center;
                justify-content: center;
                padding: 24px;
            }

                background: #111318;
                border: 1px solid #1f2530;
                border-radius: 14px;
                padding: 40px 40px 36px;
                width: 100%;
                max-width: 380px;
                text-align: center;
            }

            /* Logo Silicon SVG */
            .silicon-logo {
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 24px;
            }

            .staticrypt-title {
                font-size: 15px;
                font-weight: 600;
                color: #e8ecf2;
                margin-bottom: 4px;
                letter-spacing: 0.01em;
            }

            .staticrypt-subtitle {
                font-size: 11px;
                color: #6b7585;
                font-family: 'DM Mono', monospace;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                margin-bottom: 28px;
            }

            .staticrypt-hr {
                border: none;
                border-top: 1px solid #1f2530;
                margin-bottom: 24px;
            }

            .staticrypt-instructions {
                margin-bottom: 0;
            }

            .staticrypt-password-container {
                position: relative;
                background: #181c23;
                border: 1px solid #1f2530;
                border-radius: 8px;
                margin-bottom: 12px;
                transition: border-color 0.15s;
            }

            .staticrypt-password-container:focus-within {
                border-color: #2a3040;
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                font-size: 13px;
                font-family: 'Sora', sans-serif;
                outline: 0;
                padding: 13px 40px 13px 14px;
                width: 100%;
                color: #e8ecf2;
            }

            .staticrypt-form input[type="password"]::placeholder,
            .staticrypt-form input[type="text"]::placeholder {
                color: #6b7585;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 16px;
                opacity: 40%;
                padding: 0;
                position: absolute;
                right: 14px;
                top: 50%;
                transform: translateY(-50%);
                width: 16px;
                filter: invert(1);
                transition: opacity 0.15s;
            }

            .staticrypt-toggle-password-visibility:hover {
                opacity: 70%;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 16px;
                font-size: 12px;
                color: #6b7585;
                cursor: pointer;
                text-align: left;
            }

            .staticrypt-remember input[type="checkbox"] {
                width: 14px;
                height: 14px;
                accent-color: #00c2ff;
                flex-shrink: 0;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                width: 100%;
                background: #181c23;
                border: 1px solid #2a3040;
                border-radius: 8px;
                color: #e8ecf2;
                font-family: 'Sora', sans-serif;
                font-size: 12px;
                font-weight: 600;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                padding: 13px;
                cursor: pointer;
                transition: all 0.15s;
                margin-top: 4px;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover {
                background: #1f2530;
                border-color: #00c2ff;
                color: #00c2ff;
            }

            .staticrypt-form .staticrypt-decrypt-button:active {
                background: #1a2030;
            }

            .hidden { display: none !important; }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #0a0c0f;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 2px solid #1f2530;
                border-right-color: #00c2ff;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] {
                    font-size: 16px;
                }
            }
